# !!! TEMPORARY OPTION-B MID-KEYSTONE STATE — REVERTED IN M10 !!!
# Phase 3.1 keystone is mid-flight. S3 (eligible-fires) was exercised against
# the M5 state (0 / 30 / 0 / 3). For S4 (reping-cooldown), this file now sits
# at (0 / 30 / 2 / 3): threshold stays 0 (so PR_B is still eligible by age),
# but reping is raised to 2 (so PR_B's stale_pinged_at=today blocks a second
# ping within the same business day). After M7 (S4) verifies the skip, M10
# reverts to canonical v1 locked defaults (3 / 30 / 2 / 3).
#
# Stale-check config — Phase 3.1 STALE-01.
#
# Schema validated by tests/config-schema.test.ts via loadStaleCheckConfig.
# Defaults applied if a key is absent: stale_threshold_business_days=3,
# max_age_days=30, reping_interval_business_days=2, max_pings_per_pr=3.
#
# The `holidays:` list is ISO-8601 date strings (YYYY-MM-DD). Strict regex
# /^\d{4}-\d{2}-\d{2}$/. Append company-specific holidays (Pirros holidays,
# year-end shutdown weeks, etc.) below the US federal list.
#
# v1 holiday list = US federal holidays for the next ~12 months from
# 2026-05-08 (CONTEXT.md Decision 1).

stale_threshold_business_days: 0
max_age_days: 30
reping_interval_business_days: 2
max_pings_per_pr: 3
holidays:
  - 2026-05-25 # Memorial Day
  - 2026-07-03 # Independence Day (observed)
  - 2026-09-07 # Labor Day
  - 2026-10-12 # Indigenous Peoples' Day
  - 2026-11-11 # Veterans Day
  - 2026-11-26 # Thanksgiving
  - 2026-11-27 # Day after Thanksgiving
  - 2026-12-25 # Christmas
  - 2027-01-01 # New Year's Day
  - 2027-01-18 # MLK Day
  - 2027-02-15 # Presidents' Day
  - 2027-05-31 # Memorial Day
